info:
  name: refresh
  type: http
  seq: 7

http:
  method: POST
  url: "{{base_url}}/v1/refresh"
  body:
    type: json
    data: |-
      {
        "refresh_token": "{{refresh_token}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();

        bru.setEnvVar("token", data.data.token);
        bru.setEnvVar("refresh_token", data.data.refresh_token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
