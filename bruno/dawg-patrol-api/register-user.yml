info:
  name: register-user
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/v1/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "test",
        "email": "test@mail.com",
        "password": "testpassword"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
