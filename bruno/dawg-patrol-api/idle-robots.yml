info:
  name: idle-robots
  type: http
  seq: 12

http:
  method: GET
  url: "{{base_url}}/v1/robots/idle-robots"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        const firstRobot = data.data.AssistantRobots[0];
        bru.setEnvVar("robotID", firstRobot.id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
