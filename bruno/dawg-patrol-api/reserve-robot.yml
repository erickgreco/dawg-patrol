info:
  name: reserve-robot
  type: http
  seq: 13

http:
  method: PATCH
  url: "{{base_url}}/v1/robots/{{robotID}}/reserve-robot"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        bru.setEnvVar("reservationID", data.data.reservation_id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
